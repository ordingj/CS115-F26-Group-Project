# commands.yaml — static response strings for player command handlers
#
# Strings containing {placeholder} use Python str.format() substitution.
# Multi-line values use YAML folded scalars (>-) which collapse internal
# line breaks to spaces and strip the trailing newline, matching the original
# concatenated string literals in main.py.
# Double-quoted strings support \n as a newline escape character.

responses:
  move:
    no_exit: "You can't go that way."
    blocked: "That way is blocked."
    engine_not_initialised: "Error: engine not initialised."
    room_missing: "You are nowhere."
    lobby_forward_blocked:
      "There isn't anyone around, but the hallway is thoroughly blocked off."
    lobby_back_blocked: "You can't run from your problems, you need to take your final."
    hands_not_washed: "You feel like you should wash your hands."
    hands_still_soapy: "Your hands are still soapy. You should rinse them off first."
    wrong_4way:
      "\nSomething feels wrong. The hallway ahead looks exactly like one you've already walked.
      You think you've been here before."
    wrong_janitor:
      "\nThe hallway curves unexpectedly. After a few steps you recognise the tiles \u2014
      you've looped back. The janitor is still mopping."

  look:
    mirror_fogged: >-
      The mirror is fogged from the motion-sensor sinks. You can barely see your own
      reflection.
    sink_clean: "The sink is off. Your hands are already clean."
    sink_running_rinse: "A motion-sensor sink. The water is running. (Try: RINSE HANDS)"
    sink_running_stop: "A motion-sensor sink. The water is running. (Try: STOP)"
    sink_off: >-
      The sink is off. The motion sensor blinks. (Try: STOP to pull your hands back)

  read:
    no_target: "Read what?"
    detour_sign: "The sign reads: DETOUR \u2190 (an arrow points down the left hallway)."
    mirror_fogged: "The mirror is too fogged to read anything on it."
    generic: "You read the {item}, but the text is hard to make out."
    not_here: "There is no '{target}' here to read."

  open:
    no_target: "Open what?"
    blocked: "You try to open the {target}, but it won't budge."

  knock:
    no_target: "Knock on what?"
    no_answer: "You knock on the {target}. No answer."

  soap:
    no_location: "There's no soap dispenser here."
    already_clean: "Your hands are already clean."
    already_applied: "There's already soap on your hands. (Try: RINSE HANDS)"
    wrong_phase: "Now's not the right time to apply soap."
    applied: >-
      You pump soap from the dispenser onto your hands. They lather up. (Try: RINSE HANDS)

  dry:
    no_location: "There's nothing to dry here."
    missing_handle: "The paper towel dispenser's handle is missing."

  rinse:
    no_location: "There's nothing to rinse here."
    no_soap: "You should use soap first. (Try: SOAP HANDS)"
    already_clean: "Your hands are already clean."
    phase_0: >-
      You hold your hands under the faucet. The water runs over them for a moment... then cuts
      off. Your hands are sudsy but the sensor timed out before you could rinse. Try 'stop' to
      let the sensor reset.
    phase_2: >-
      You put your hands back under quickly. This time the water stays running long enough to
      rinse the soap off. Your hands are clean. Type 'stop' to take your hands away.
    phase_1_wrong: >-
      The water is off. Pull your hands back first - try 'stop' to let the motion sensor reset.
    phase_1_wrong_2: >-
      The water is still off. The sensor won't re-trigger until the basin is empty. Try 'stop'
      to pull your hands away, then rinse again.
    phase_1_wrong_3: >-
      Tip: the sequence is RINSE -> STOP -> RINSE -> STOP. The water cut off after your first
      rinse - type 'stop' now.
    phase_done: "Your hands are already rinsed. Type 'stop' to finish."

  stop:
    no_location: "There's nothing to stop here."
    already_clean: "The sink is already off. Your hands are clean."
    phase_1: >-
      You pull your hands back. A moment passes... the sensor detects the empty basin and the
      water comes back on. Quick - rinse hands again.
    phase_3: >-
      You take your hands away. The water shuts off. Your hands are clean. The steam on the
      mirror has cleared a little. You should look at it.
    phase_0: "You step back from the sink. The water keeps running."
    fallback: "You step back from the sink."

  listen:
    silence: "You listen carefully. The building hums with an uneasy silence."
    janitor_prefix: "The janitor is humming. You catch a few bars of the chorus:"

  check:
    watch: "Your watch reads {time} remaining."
    phone: "No signal. Battery at 3%. A calendar notification reads: FINAL EXAM TODAY."
    other: "You check the {target}, but find nothing useful."

  inventory:
    list_prefix: "You're carrying:"
    empty: "You have nothing on you. How did that happen."
    drop: "You should probably hang onto that."
    backpack: "You don't have time for that right now."
    phone: "You don't have time for that right now."
    keys: "How will that help you find Room 314?"
    wallet: "How will that help you find Room 314?"
    watch: "Your watch reads {time} remaining."
    not_carrying: "You don't have a {target}."

  quit:
    farewell: "You give up and head home. Game over."

  unknown: "I don't know how to '{verb}'."

  help:
    header: "Available commands:"
    entries:
      - "FORWARD / F / BACK / B / LEFT / L / RIGHT / R  — Move in that direction."
      - "LOOK [item]                    — Describe the room, or examine an item."
      - "EXAMINE [item]                 — Same as LOOK."
      - "READ [item]                    — Read something (sign, mirror, etc.)."
      - "LISTEN                         — Listen to ambient sounds."
      - "SOAP HANDS                     — Apply soap from the dispenser."
      - "RINSE HANDS / WASH HANDS       — Rinse your hands under the sink."
      - "STOP                           — Pull your hands back from the sink."
      - "DRY [HANDS]                    — Try to use the paper towel dispenser."
      - "OPEN [item]                    — Try to open a door or object."
      - "KNOCK [item]                   — Knock on a door or object."
      - "CHECK WATCH                    — See how much time you have left."
      - "INVENTORY / I                  — List items you are carrying."
      - "HELP                           — Show this message."
      - "QUIT / EXIT                    — Give up and exit."

  bathroom_status:
    clean: "The sink is off. Your hands are clean."
    soap_needed: >-
      The motion-sensor sink is running. Try the soap dispenser first. (Try: SOAP HANDS)
    soapy: >-
      The motion-sensor sink is running. Your hands are soapy - rinse them off. (Try: RINSE
      HANDS)
    water_cut: >-
      The water cut off. Your hands are still soapy. (Try: STOP to pull your hands back)
    water_back: >-
      The water came back on. Quick - rinse again before it cuts off. (Try: RINSE HANDS)
    final_rinse: "The water is still running. Your hands are clean. (Try: STOP)"

  ambient:
    janitor_hint_prefix: "The janitor is humming. You catch a few lyrics:"

  intro:
    ascii_art: |-
      __________________
      /_____ROOM_314____/|
      |                | |
      |  FIND YOUR     | |
      |  CLASSROOM     | /
      |________________|/
    title: "FINAL EXAM: ROOM 314"
    opening: "Your final exam starts in 10 minutes."
    problem: "The problem: you can't find the classroom."
    teacher: >-
      Your teacher's voice echoes: "The final will be in Room 314. You really don't want to be
      late."
    curses_subtitle: "Your final exam starts in 10 minutes. Find Room 314."
    help_hint: "Type HELP for a list of commands."

  # ── curses UI panel labels ─────────────────────────────────────────────────
  # These strings appear as visible labels in the curses split-pane interface.
  # Changing them here updates all panel headings without touching Python code.
  ui_labels:
    header_time_prefix: "Time: "
    panel_room: "LOCATION"
    panel_log: "ACTIVITY"
    section_details: "DETAILS"
    section_exits: "EXITS"
    section_items: "YOU NOTICE"
    plain_exits_prefix: "Exits: "
    plain_items_prefix: "You see: "
    plain_time_prefix: "Time remaining: "

  cli:
    description: "Final Exam: Room 314 – a text adventure"
    no_curses_help: "Run in plain-text mode (no curses UI)"

  end:
    won_early: |-
      YOU MADE IT TO ROOM 314 — FIVE MINUTES EARLY.
      The room is empty. The desks are empty. The exam schedule on the door says
      the final isn't until TOMORROW. You sit down anyway. You are very tired.
    won: |-
      YOU MADE IT TO ROOM 314!
      The exam is already in progress, but you're here.
    lost: |-
      TIME'S UP.
      You hear the distant sound of exam papers being collected.
      Game over.
    press_enter_to_replay: "(Press Enter to replay, or anything else to exit)"
