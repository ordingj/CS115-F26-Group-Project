    title: "One Step Left"
    chorus: "One step left, then you're home."

  - direction: left
    title: "Turn to the Left"
    chorus: "Turn to the left, don't look back."

  - direction: left
    title: "Left Side of the Road"
    chorus: "Always on the left side of the road."

  - direction: left
    title: "Left Behind"
    chorus: "You left me left behind."

  - direction: left
    title: "Take a Left"
    chorus: "Take a left at the end of the hall."

  - direction: left
    title: "Left of Center"
    chorus: "I live just to the left of center."

  - direction: left
    title: "Keep Left"
    chorus: "Keep left, keep left, keep left 'til the end."

  - direction: left
    title: "The Left Hand Path"
